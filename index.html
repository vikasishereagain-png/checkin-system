<!DOCTYPE html>

<html>
<head>
  <title>Auto Check-In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }

    input {
      padding: 12px;
      width: 250px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 14px 25px;
      font-size: 18px;
      margin-top: 15px;
      cursor: pointer;
      background-color: green;
      color: white;
      border: none;
      border-radius: 6px;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }

    video {
      border-radius: 10px;
    }
  </style>

</head>

<body>

<h2>Scan & Check-In</h2>

<input type="text" id="name" placeholder="Enter your name" />
<br><br>

<video id="video" width="250" height="200" autoplay></video>

<br><br> <button onclick="checkIn()">Check In</button>

<p id="message"></p>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let stream;

// Start camera automatically
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(s => {
  stream = s;
  document.getElementById("video").srcObject = stream;
})
.catch(err => {
  document.getElementById("message").innerText = "Camera permission denied";
});

// Check-in (auto capture)
function checkIn() {
  let name = document.getElementById("name").value.trim();

  if(name === "") {
    document.getElementById("message").innerText = "Enter your name";
    return;
  }

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  let photoData = canvas.toDataURL("image/png");

  document.getElementById("message").innerText = "Checking in...";

  fetch("https://script.google.com/macros/s/AKfycbzP6EFnufdZHTVQSbTZ0zZa3W2zoIE_jc0wW05LsaSSP8IVoMEA_fYrk9lVgNmJm0LFpA/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      name: name,
      photo: photoData
    })
  })
  .then(() => {
    document.getElementById("message").innerText = "✅ Checked in successfully!";
    document.getElementById("name").value = "";
  })
  .catch(err => {
    document.getElementById("message").innerText = "❌ " + err;
  });
}
</script>

</body>
</html>
