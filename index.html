<!DOCTYPE html>

<html>
<head>
  <title>Check-In System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }

    input {
      padding: 12px;
      width: 250px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<h2>Scan & Check-In</h2>

<input type="text" id="name" placeholder="Enter your name" />
<br><br>

<video id="video" width="250" height="200" autoplay></video> <br> <button onclick="capturePhoto()">📷 Capture Photo</button>

<br><br> <button onclick="checkIn()">Check In</button>

<p id="message"></p>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let photoData = "";

// Open front camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(err => {
  document.getElementById("message").innerText = "Camera permission denied";
});

// Capture photo
function capturePhoto() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  photoData = canvas.toDataURL("image/png");

  document.getElementById("message").innerText = "📸 Photo captured!";
}

// Send data
function checkIn() {
  let name = document.getElementById("name").value.trim();

  if(name === "") {
    document.getElementById("message").innerText = "Enter your name";
    return;
  }

  if(photoData === "") {
    document.getElementById("message").innerText = "Capture photo first";
    return;
  }

  document.getElementById("message").innerText = "Checking in...";

  fetch("https://script.google.com/macros/s/AKfycbzP6EFnufdZHTVQSbTZ0zZa3W2zoIE_jc0wW05LsaSSP8IVoMEA_fYrk9lVgNmJm0LFpA/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      photo: photoData
    }),
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "existing") {
      document.getElementById("message").innerText = "✅ Welcome back!";
    } 
    else if(data.status === "new") {
      document.getElementById("message").innerText = "🆕 New user added!";
    } 
    else {
      document.getElementById("message").innerText = "❌ ERROR: " + data.message;
    }

    document.getElementById("name").value = "";
    photoData = "";
  })
  .catch(err => {
    document.getElementById("message").innerText = "❌ Failed to connect";
  });
}
</script>

</body>
</html>
